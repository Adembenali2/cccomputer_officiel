<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cccomputer</title>
  <link rel="icon" type="image/png" href="assets/img/logo.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <a href="index.html" class="sidebar-brand d-flex align-items-center gap-2 text-white text-decoration-none">
        <img src="assets/img/logo.png" alt="Logo Cccomputer" class="topbar-logo">
        <span>Cccomputer</span>
      </a>
      <nav class="nav flex-column sidebar-nav">
        <a class="nav-link" href="index.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a class="nav-link" href="imprimantes.html"><i class="bi bi-printer-fill"></i> Photocopieurs</a>
        <a class="nav-link" href="clients.html"><i class="bi bi-people-fill"></i> Clients</a>
        <a class="nav-link" href="sav.html"><i class="bi bi-tools"></i> SAV</a>
        <a class="nav-link" href="contrats.html"><i class="bi bi-truck"></i> Livraison</a>
        <a class="nav-link" href="factures.html"><i class="bi bi-receipt"></i> Factures et paiements</a>
        <a class="nav-link" href="stock.html"><i class="bi bi-clock-history"></i> Historique</a>
      </nav>
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <main class="main-content">
      <header class="topbar d-flex align-items-center justify-content-between px-3 px-md-4">
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-outline-secondary d-md-none" id="sidebarToggle" type="button" aria-label="Ouvrir le menu">
            <i class="bi bi-list"></i>
          </button>
        </div>

        <div class="d-flex align-items-center gap-2 topbar-actions">
          <a href="messagerie.html" class="topbar-icon-link" title="Messagerie" aria-label="Messagerie"><i class="bi bi-chat-dots"></i></a>
          <a href="calendrier.html" class="topbar-icon-link" title="Calendrier" aria-label="Calendrier"><i class="bi bi-calendar3"></i></a>
          <a href="#" class="topbar-icon-link" title="Espace commercial" aria-label="Espace commercial"><i class="bi bi-briefcase"></i></a>
          <a href="#" class="topbar-icon-link" title="Profil" aria-label="Profil"><i class="bi bi-person-circle"></i></a>
          <a href="maps.html" class="topbar-icon-link" title="Maps" aria-label="Maps"><i class="bi bi-geo-alt"></i></a>
          <button class="btn topbar-icon-link" id="themeToggle" type="button" title="Changer le thème" aria-label="Changer le thème">
            <i class="bi bi-moon-stars"></i>
          </button>
          <a href="#" class="topbar-link text-danger-emphasis">
            <i class="bi bi-box-arrow-left"></i>
            <span>Logout</span>
          </a>
        </div>
      </header>

      <section class="content p-3 p-md-4">
        <div class="card map-card">
          <div class="card-header bg-white d-flex flex-wrap justify-content-between align-items-center gap-2">
            <div>
              <h2 class="h6 mb-1">Emplacements des clients</h2>
              <p class="mb-0 small text-muted">Carte interactive des sites clients</p>
            </div>
            <span class="badge text-bg-primary" id="mapClientCount">0 clients</span>
          </div>
          <div class="card-body">
            <div class="row g-3">
              <div class="col-lg-4">
                <label for="mapClientSearch" class="form-label">Rechercher un client</label>
                <input type="search" id="mapClientSearch" class="form-control mb-3" placeholder="Ex: Beta Conseil">
                <div class="row g-2 mb-3">
                  <div class="col-12">
                    <label for="mapDateFilter" class="form-label">Jour (date exacte)</label>
                    <input type="date" id="mapDateFilter" class="form-control">
                  </div>
                  <div class="col-12">
                    <label for="mapTypeFilter" class="form-label">Type d'intervention</label>
                    <select id="mapTypeFilter" class="form-select">
                      <option value="all">SAV + Livraisons</option>
                      <option value="sav">SAV seulement</option>
                      <option value="livraison">Livraisons seulement</option>
                    </select>
                  </div>
                </div>
                <div id="mapClientList" class="map-client-list"></div>
                <div class="mt-3 p-2 border rounded bg-light-subtle">
                  <h3 class="h6 mb-2">Itineraire</h3>
                  <p class="small text-muted mb-2">Genere le trajet des interventions du jour selon ton filtre.</p>
                  <button type="button" class="btn btn-primary btn-sm mb-2 w-100" id="generateRouteBtn">
                    <i class="bi bi-signpost-split"></i> Generer l'itineraire
                  </button>
                  <button type="button" class="btn btn-outline-secondary btn-sm w-100 mb-2" id="clearRouteBtn">
                    Effacer l'itineraire
                  </button>
                  <div id="routeSummary" class="small"></div>
                  <ol id="routeStops" class="small ps-3 mb-0"></ol>
                </div>
              </div>
              <div class="col-lg-8">
                <div id="clientsMap" class="clients-map" aria-label="Carte des emplacements clients"></div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
