<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cccomputer</title>
  <link rel="icon" type="image/png" href="assets/img/logo.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <a href="index.html" class="sidebar-brand d-flex align-items-center gap-2 text-white text-decoration-none">
        <img src="assets/img/logo.png" alt="Logo Cccomputer" class="topbar-logo">
        <span>Cccomputer</span>
      </a>
      <nav class="nav flex-column sidebar-nav">
        <a class="nav-link" href="index.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a class="nav-link" href="imprimantes.html"><i class="bi bi-printer-fill"></i> Photocopieurs</a>
        <a class="nav-link" href="clients.html"><i class="bi bi-people-fill"></i> Clients</a>
        <a class="nav-link" href="sav.html"><i class="bi bi-tools"></i> SAV</a>
        <a class="nav-link" href="contrats.html"><i class="bi bi-truck"></i> Livraison</a>
        <a class="nav-link" href="factures.html"><i class="bi bi-receipt"></i> Factures et paiements</a>
        <a class="nav-link" href="stock.html"><i class="bi bi-clock-history"></i> Historique</a>
      </nav>
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <main class="main-content">
      <header class="topbar d-flex align-items-center justify-content-between px-3 px-md-4">
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-outline-secondary d-md-none" id="sidebarToggle" type="button" aria-label="Ouvrir le menu">
            <i class="bi bi-list"></i>
          </button>
        </div>

        <div class="d-flex align-items-center gap-2 topbar-actions">
          <a href="messagerie.html" class="topbar-icon-link" title="Messagerie" aria-label="Messagerie"><i class="bi bi-chat-dots"></i></a>
          <a href="calendrier.html" class="topbar-icon-link" title="Calendrier" aria-label="Calendrier"><i class="bi bi-calendar3"></i></a>
          <a href="#" class="topbar-icon-link" title="Espace commercial" aria-label="Espace commercial"><i class="bi bi-briefcase"></i></a>
          <a href="#" class="topbar-icon-link" title="Profil" aria-label="Profil"><i class="bi bi-person-circle"></i></a>
          <a href="maps.html" class="topbar-icon-link" title="Maps" aria-label="Maps"><i class="bi bi-geo-alt"></i></a>
          <button class="btn topbar-icon-link" id="themeToggle" type="button" title="Changer le thème" aria-label="Changer le thème">
            <i class="bi bi-moon-stars"></i>
          </button>
          <a href="#" class="topbar-link text-danger-emphasis">
            <i class="bi bi-box-arrow-left"></i>
            <span>Logout</span>
          </a>
        </div>
      </header>

      <section class="content p-3 p-md-4">
        <div class="card chat-room-card">
          <div class="card-header chat-room-header bg-white d-flex flex-wrap align-items-center justify-content-between gap-2">
            <div>
              <h2 class="h6 mb-1">Messagerie equipe CCComputer</h2>
              <p class="mb-0 small text-muted">Un seul salon commun pour tous les utilisateurs</p>
            </div>
            <div class="chat-room-members small">
              <i class="bi bi-people-fill"></i>
              <span id="chatMemberCount">8 membres</span>
            </div>
          </div>
          <div class="card-body chat-room-body p-0">
            <div id="chatMessages" class="chat-messages" aria-live="polite"></div>
            <div class="chat-mention-suggestions d-none" id="chatMentionSuggestions"></div>
            <form id="chatForm" class="chat-composer border-top p-3">
              <div class="d-flex align-items-center gap-2 mb-2">
                <label for="chatAuthor" class="form-label mb-0">Utilisateur</label>
                <select id="chatAuthor" class="form-select form-select-sm chat-author-select">
                  <option>Romain Lefevre</option>
                  <option>Camille Dupont</option>
                  <option>Yanis Touati</option>
                  <option>Sarah Benali</option>
                  <option>Thomas Garcia</option>
                  <option>Julie Martin</option>
                  <option>Amine B.</option>
                  <option>Karim T.</option>
                </select>
              </div>
              <div class="mb-2">
                <textarea id="chatMessageInput" class="form-control" rows="3" placeholder="Ecrire un message... Utilisez @ pour mentionner une personne." required></textarea>
              </div>
              <div id="chatImagePreview" class="chat-image-preview d-none mb-2"></div>
              <div class="d-flex flex-wrap align-items-center justify-content-between gap-2">
                <div class="d-flex align-items-center gap-2">
                  <label for="chatImageInput" class="btn btn-outline-secondary btn-sm mb-0">
                    <i class="bi bi-image"></i> Ajouter une photo
                  </label>
                  <input id="chatImageInput" class="d-none" type="file" accept="image/*">
                  <button id="chatClearImage" type="button" class="btn btn-outline-danger btn-sm d-none">Retirer la photo</button>
                </div>
                <button type="submit" class="btn btn-primary">
                  <i class="bi bi-send-fill"></i> Envoyer
                </button>
              </div>
            </form>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
